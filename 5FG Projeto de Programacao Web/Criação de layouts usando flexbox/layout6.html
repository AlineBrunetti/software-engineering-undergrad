<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Layout 6 - Dribbble</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fundo-claro">
    
    <header class="l6-cabecalho">
        <div class="l6-topo">
            <span>Logo</span>
            <div class="slot-input-busca">O que você está procurando?</div>
            <nav>Explore | Hire a Designer | Find Jobs | Blog</nav>
            <div class="l6-acoes">
                <span>Sign up</span>
                <div class="slot-botao-escuro">Log in</div>
            </div>
        </div>
        <div class="l6-filtros">
            <div class="slot-botao-contorno">Popular</div>
            <nav>Discover | Animation | Branding | Illustration | Mobile | Print</nav>
            <div class="slot-botao-contorno">Filters</div>
        </div>
    </header>

    <main class="l6-corpo">
        <div class="l6-grid">
            <div class="l6-card">
                <div class="l6-foto-card"><img src="https://loremflickr.com/400/300/puppy?lock=31"></div>
                <div class="l6-rodape-card">Autor 1</div>
            </div>
            <div class="l6-card">
                <div class="l6-foto-card"><img src="https://loremflickr.com/400/300/peacock?lock=32"></div>
                <div class="l6-rodape-card">Autor 2</div>
            </div>
            <div class="l6-card">
                <div class="l6-foto-card"><img src="https://loremflickr.com/400/300/puppy?lock=33"></div>
                <div class="l6-rodape-card">Autor 3</div>
            </div>
            <div class="l6-card">
                <div class="l6-foto-card"><img src="https://loremflickr.com/400/300/peacock?lock=34"></div>
                <div class="l6-rodape-card">Autor 4</div>
            </div>
        </div>
    </main>

</body>
</html>
